services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-utilities_platform}
      POSTGRES_USER: ${POSTGRES_USER:-utilities}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://utilities:change-me@postgis:5432/utilities_platform}
    ports:
      - "8000:8000"
    depends_on:
      - postgis

volumes:
  postgis_data:
