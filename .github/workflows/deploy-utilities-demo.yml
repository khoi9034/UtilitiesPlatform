name: Deploy Utilities Platform Demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "scripts/demo/**"
      - ".github/workflows/deploy-utilities-demo.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-demo:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/configure-pages@v5
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build static demo
        working-directory: frontend
        env:
          NEXT_PUBLIC_APP_MODE: demo
          DEMO_EXPORT: "true"
          GITHUB_PAGES_BASE_PATH: UtilitiesPlatform
        run: npm run build:demo
      - name: Validate demo data safety
        run: python scripts/demo/validate_demo_data.py --demo-root frontend/demo-data
      - name: Check demo feature parity
        working-directory: frontend
        run: npm run test:parity
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out
      - id: deployment
        uses: actions/deploy-pages@v4
